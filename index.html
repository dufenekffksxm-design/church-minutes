<style>
:root {
  --bg:#F7F5F0;--bg2:#EDE9E0;--card:#FFFFFF;--border:#E5E2DB;--border2:#D4CFC5;
  --text1:#2C2820;--text2:#4A4538;--text3:#6B6255;--text4:#8A8070;--text5:#B0A890;
  --ops:#1B6B4A;--ops-light:#E8F5EE;--cong:#8B5A2B;--cong-light:#FFF3E8;--accent:#C4866B;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text1);min-height:100vh;min-height:100dvh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.container{max-width:720px;margin:0 auto;padding:16px 14px 60px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-up{animation:fadeUp .35s ease}.anim-in{animation:fadeIn .25s ease}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:9px 16px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ops{background:var(--ops);color:#fff;box-shadow:0 2px 8px rgba(27,107,74,.25)}
.btn-cong{background:var(--cong);color:#fff;box-shadow:0 2px 8px rgba(139,90,43,.25)}
.btn-primary{background:var(--text1);color:#fff}
.btn-secondary{background:var(--card);color:var(--text3);border:1px solid var(--border2)}
.btn-danger{background:#FFF0F0;color:#D4726A;border:1px solid #F5D5D0}
.btn-sm{padding:6px 12px;font-size:12px}.btn-block{width:100%}
.btn-icon{width:34px;height:34px;padding:0;border-radius:7px;background:var(--card);border:1px solid var(--border);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:active{transform:scale(.93)}

/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:2px;background:var(--card);border-radius:8px;padding:3px;border:1px solid var(--border)}
.filter-tab{padding:6px 14px;border-radius:6px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:var(--text4);cursor:pointer;transition:all .15s}
.filter-tab.active{background:var(--text1);color:#fff}
.search-input{flex:1;min-width:160px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:13px;background:var(--card);color:var(--text1);outline:none}
.search-input:focus{border-color:var(--border2);box-shadow:0 0 0 3px rgba(212,207,197,.3)}

/* Cards */
.card-list{display:grid;gap:10px}
.minute-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .2s;border-left:4px solid var(--border2)}
.minute-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07)}
.minute-card[data-type="operations"]{border-left-color:var(--ops)}
.minute-card[data-type="congregation"]{border-left-color:var(--cong)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-badges{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}
.badge-ops{background:var(--ops-light);color:var(--ops)}.badge-cong{background:var(--cong-light);color:var(--cong)}
.badge-example{background:#FFF0F0;color:#D4726A}
.card-title{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:3px}
.card-meta{font-size:12px;color:var(--text4)}.card-meta2{font-size:12px;color:var(--text5);margin-top:2px}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.card-footer{font-size:11px;color:var(--text5);margin-top:8px}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--text5);background:var(--card);border-radius:12px;border:1px solid var(--border)}
.empty-icon{font-size:36px;margin-bottom:8px}.empty-title{font-size:14px;font-weight:600}.empty-sub{font-size:12px;margin-top:4px}

/* Info */
.info-box{margin-top:20px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:12px;color:var(--text4);line-height:1.9}
.info-box strong{color:var(--text3)}.info-box .info-title{font-weight:700;margin-bottom:6px;color:var(--text3);font-size:13px}

/* Form */
.form-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--border)}
.form-header-bar{width:5px;height:34px;border-radius:3px;flex-shrink:0}
.form-header small{font-size:11px;font-weight:700;letter-spacing:1px}
.form-header h2{font-size:19px;font-weight:800;color:var(--text1)}
.form-grid{display:grid;gap:10px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text3);margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:13px;background:var(--card);color:var(--text1);outline:none}
.form-input:focus{border-color:var(--border2);box-shadow:0 0 0 3px rgba(212,207,197,.25)}
textarea.form-input{resize:vertical;min-height:72px;line-height:1.6}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}

/* Agenda */
.agenda-item-card{background:#FAFAF8;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.agenda-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.agenda-item-num{font-weight:700;color:var(--text3);font-size:13px}
.agenda-remove{background:none;border:none;color:var(--accent);cursor:pointer;font-size:20px;line-height:1;padding:0 4px}
.agenda-decision-input{border-left:3px solid var(--text5)!important}
.agenda-add{width:100%;padding:10px;background:none;border:2px dashed var(--border2);border-radius:8px;color:var(--text4);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
.agenda-add:hover{background:rgba(0,0,0,.015)}

/* Viewer */
.viewer-doc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 22px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.viewer-header{text-align:center;border-bottom:3px double var(--border2);padding-bottom:16px;margin-bottom:18px}
.viewer-church{font-size:12px;color:var(--text4)}
.viewer-title{font-size:20px;font-weight:800;color:var(--text1);margin:5px 0 8px}
.viewer-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 14px;border-radius:4px}
.viewer-badge-ops{border:1.5px solid var(--ops);color:var(--ops)}.viewer-badge-cong{border:1.5px solid var(--cong);color:var(--cong)}
.info-grid{display:grid;grid-template-columns:78px 1fr 78px 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;font-size:13px}
.info-grid-full{grid-column:2/-1}
.ig-label{background:#F5F3EE;padding:7px 8px;font-weight:700;text-align:center;color:var(--text3);font-size:12px}
.ig-value{background:var(--card);padding:7px 10px;color:var(--text1)}
.viewer-section-title{font-size:13.5px;font-weight:700;background:#F5F3EE;padding:7px 12px;margin:16px 0 12px;color:var(--text1)}
.viewer-section-title-ops{border-left:4px solid var(--ops)}.viewer-section-title-cong{border-left:4px solid var(--cong)}
.viewer-agenda{margin-bottom:14px;padding-left:2px}
.viewer-agenda-title{font-weight:700;font-size:14px;color:var(--text1);margin-bottom:3px}
.viewer-agenda-content{font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.7;padding-left:14px}
.viewer-decision{font-size:13px;margin-top:5px;padding:5px 10px}
.viewer-decision-ops{background:var(--ops-light);border-left:3px solid var(--ops)}
.viewer-decision-cong{background:var(--cong-light);border-left:3px solid var(--cong)}
.viewer-field{font-size:13px;color:var(--text3);margin-top:4px}
.sign-area{display:flex;justify-content:center;gap:56px;margin-top:32px;padding-top:16px;border-top:1px solid var(--border)}
.sign-box{text-align:center}.sign-line{width:110px;border-bottom:1px solid #333;height:36px}
.sign-label{font-size:12px;color:var(--text3);margin-top:4px}
.viewer-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 28px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08);animation:fadeUp .4s ease}
.login-box h1{font-size:22px;font-weight:900;text-align:center;color:var(--text1);margin-bottom:4px}
.login-box .sub{font-size:12px;color:var(--text4);text-align:center;margin-bottom:24px}
.login-error{background:#FFF0F0;color:#D4726A;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text1);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.2);z-index:1000;animation:fadeUp .3s ease}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:900;animation:fadeIn .2s ease;padding:20px}
.modal-box{background:var(--card);border-radius:14px;padding:24px;max-width:380px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.15);animation:fadeUp .25s ease}
.modal-title{font-size:16px;font-weight:800;color:var(--text1);margin-bottom:8px}
.modal-text{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

/* Loading */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--text1);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px;color:var(--text4);font-size:13px}

/* User bar */
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;font-size:12px}
.user-info{display:flex;align-items:center;gap:8px}
.user-role{padding:2px 8px;border-radius:4px;font-weight:700;font-size:10px}
.role-pastor{background:#E8E0F5;color:#6B4FA0}.role-secretary{background:var(--ops-light);color:var(--ops)}.role-viewer{background:#F0F0F0;color:var(--text4)}

@media(max-width:480px){
  .container{padding:12px 10px 50px}.form-row2{grid-template-columns:1fr}
  .info-grid{grid-template-columns:68px 1fr}.info-grid-full{grid-column:2/-1}
  .sign-area{gap:36px}.sign-line{width:90px}.viewer-doc{padding:18px 14px}
  .header-actions{flex-wrap:wrap;gap:4px}.btn{padding:8px 11px;font-size:12px}
}

<script>

// ══════════════════════════════════════════
const SUPABASE_URL = 'https://azkyveftbxrmfytszddz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6a3l2ZWZ0YnhybWZ5dHN6ZGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTg2NzMsImV4cCI6MjA5MDA3NDY3M30.NkCPIe20Vwjnaf5eRsNnTrtGn6IBV4pXW-mUhWLUhAY';
const HEADERS = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(table, params='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {headers:HEADERS});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {method:'POST',headers:HEADERS,body:JSON.stringify(data)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(table, match, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${match}`, {method:'PATCH',headers:HEADERS,body:JSON.stringify(data)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, match) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${match}`, {method:'DELETE',headers:HEADERS});
  if (!r.ok) throw new Error(await r.text());
}
async function sbRpc(fn, params) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {method:'POST',headers:HEADERS,body:JSON.stringify(params)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
const TYPES = {operations:{label:'운영위원회',color:'ops'},congregation:{label:'공동의회',color:'cong'}};
const ROLES = {pastor:{label:'담임목사',class:'role-pastor'},secretary:{label:'서기',class:'role-secretary'},viewer:{label:'열람자',class:'role-viewer'}};
const PERMS = {pastor:{create:true,edit:true,delete:true,manage:true},secretary:{create:true,edit:true,delete:false,manage:false},viewer:{create:false,edit:false,delete:false,manage:false}};

let state = {view:'login',user:null,minutes:[],current:null,agendaItems:[],filterType:'all',search:'',loading:false,toast:null,modal:null,stamps:{church:null,chairperson:null,secretary:null}};
function setState(p){Object.assign(state,p);render()}
function showToast(m){state.toast=m;render();setTimeout(()=>{state.toast=null;render()},2200)}
const app=document.getElementById('app');
const $=(s,p)=>(p||document).querySelector(s);
const $$=(s,p)=>[...(p||document).querySelectorAll(s)];
function esc(s){if(!s)return'';const el=document.createElement('div');el.textContent=s;return el.innerHTML}
function formatDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');const wd=['일','월','화','수','목','금','토'][d.getDay()];return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일(${wd})`}
function can(action){return state.user&&PERMS[state.user.role]&&PERMS[state.user.role][action]}

// ══════════════════════════════════════════
//  Session
// ══════════════════════════════════════════
function saveSession(){if(state.user)localStorage.setItem('cm-session',JSON.stringify(state.user));else localStorage.removeItem('cm-session')}
function loadSession(){try{const s=localStorage.getItem('cm-session');if(s)return JSON.parse(s)}catch{}return null}

// ══════════════════════════════════════════
//  Stamps
// ══════════════════════════════════════════
async function loadStamps(){
  try{
    const stamps=await sbGet('stamps','');
    stamps.forEach(s=>{state.stamps[s.stamp_type]={id:s.id,imageData:s.image_data,label:s.label}});
  }catch(e){console.log('Stamps table may not exist yet',e)}
}
async function saveStamp(type,imageData,label){
  try{
    const existing=state.stamps[type];
    if(existing&&existing.id){
      await sbPatch('stamps',`id=eq.${existing.id}`,{image_data:imageData,label:label||''});
    }else{
      await sbPost('stamps',{stamp_type:type,image_data:imageData,label:label||'',uploaded_by:state.user.id});
    }
    await loadStamps();
    showToast('도장이 등록되었습니다');
  }catch(e){console.error(e);showToast('도장 등록에 실패했습니다')}
}
async function deleteStamp(type){
  try{
    const existing=state.stamps[type];
    if(existing&&existing.id){await sbDelete('stamps',`id=eq.${existing.id}`);state.stamps[type]=null;showToast('도장이 삭제되었습니다');render()}
  }catch(e){console.error(e);showToast('삭제에 실패했습니다')}
}
function fileToBase64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})
}

// ══════════════════════════════════════════
//  Data
// ══════════════════════════════════════════
async function loadMinutes(){
  state.loading=true;render();
  try{
    const mins=await sbGet('minutes','order=date.desc,created_at.desc');
    for(const m of mins){
      const items=await sbGet('agenda_items',`minute_id=eq.${m.id}&order=sort_order.asc`);
      m.agendaItems=items||[];
    }
    state.minutes=mins;
    await loadStamps();
  }catch(e){console.error(e);showToast('데이터를 불러오지 못했습니다')}
  state.loading=false;render();
}

async function saveMinute(m, items){
  state.loading=true;render();
  try{
    const exists=state.minutes.find(x=>x.id===m.id);
    const payload={type:m.type,title:m.title,date:m.date||null,location:m.location,chairperson:m.chairperson,secretary:m.secretary,attendees:m.attendees,absentees:m.absentees,opening_prayer:m.openingPrayer,closing_prayer:m.closingPrayer,next_meeting:m.nextMeeting,notes:m.notes,updated_at:new Date().toISOString()};
    let saved;
    if(exists){
      const res=await sbPatch('minutes',`id=eq.${m.id}`,payload);
      saved=res[0];
    }else{
      payload.created_by=state.user.id;
      payload.is_example=false;
      const res=await sbPost('minutes',payload);
      saved=res[0];
    }
    // Delete old agenda items and insert new
    await sbDelete('agenda_items',`minute_id=eq.${saved.id}`);
    if(items.length){
      const agendaPayload=items.map((a,i)=>({minute_id:saved.id,sort_order:i,title:a.title,content:a.content,decision:a.decision}));
      await sbPost('agenda_items',agendaPayload);
    }
    await loadMinutes();
    const full=state.minutes.find(x=>x.id===saved.id);
    state.current=full;
    state.agendaItems=full?full.agendaItems:[];
    showToast('저장되었습니다');
    setState({view:'viewer',loading:false});
  }catch(e){console.error(e);showToast('저장에 실패했습니다');state.loading=false;render()}
}

async function deleteMinute(id){
  state.loading=true;render();
  try{
    await sbDelete('agenda_items',`minute_id=eq.${id}`);
    await sbDelete('minutes',`id=eq.${id}`);
    await loadMinutes();
    showToast('삭제되었습니다');
    setState({view:'list',current:null,loading:false});
  }catch(e){console.error(e);showToast('삭제에 실패했습니다');state.loading=false;render()}
}

    {title:'전년도 결산 보고 및 승인',content:'○○○○년도 결산을 보고하다.\n- 총 수입: ___원\n- 총 지출: ___원\n- 이월금: ___원',decision:'출석 의원 과반수 찬성으로 승인'},
    {title:'신년도 예산(안) 심의 및 의결',content:'○○○○년도 예산(안)을 상정하다.\n- 총 예산: ___원',decision:'출석 의원 과반수 찬성으로 의결'},
    {title:'임원 선출',content:'(해당 시) 임기 만료에 따른 임원 선출을 진행하다.\n- 후보: \n- 투표 방식: 무기명 비밀투표',decision:'투표 결과 ___을(를) 선출하다'}
  ]};
}

// ══════════════════════════════════════════
//  PDF
// ══════════════════════════════════════════
function printMinute(m){
  const tc=m.type==='operations'?'#1B6B4A':'#8B5A2B';
  const tl=TYPES[m.type].label;
  const st=state.stamps;
  const chairImg=st.chairperson?`<img src="${st.chairperson.imageData}" style="width:60px;height:60px;object-fit:contain">`:' ';
  const secImg=st.secretary?`<img src="${st.secretary.imageData}" style="width:60px;height:60px;object-fit:contain">`:' ';
  const churchImg=st.church?`<div style="text-align:center;margin-top:20px"><img src="${st.church.imageData}" style="width:70px;height:70px;object-fit:contain"><div style="font-size:8pt;color:#999;margin-top:2px">교회 직인</div></div>`:'';
  const agenda=m.agendaItems.map((a,i)=>`<div style="margin-bottom:13px;page-break-inside:avoid"><div style="font-weight:bold;font-size:10.5pt;margin-bottom:2px">${i+1}. ${esc(a.title)}</div><div style="font-size:10pt;padding-left:12px;white-space:pre-wrap;line-height:1.7">${esc(a.content)}</div>${a.decision?`<div style="font-size:10pt;margin-top:4px;padding:4px 10px;background:#f9f9f9;border-left:3px solid ${tc}"><b>의결사항:</b> ${esc(a.decision)}</div>`:''}</div>`).join('');
  const opn=m.opening_prayer||m.openingPrayer||'';
  const cls=m.closing_prayer||m.closingPrayer||'';
  const nxt=m.next_meeting||m.nextMeeting||'';
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>@page{size:A4;margin:20mm 18mm}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:11pt;line-height:1.7;color:#222}.page{max-width:170mm;margin:0 auto}.hdr{text-align:center;border-bottom:3px double #333;padding-bottom:13px;margin-bottom:16px}.cn{font-size:10pt;color:#666;margin-bottom:3px}.dt{font-size:18pt;font-weight:bold;letter-spacing:2px}.tb{display:inline-block;font-size:9pt;padding:2px 12px;border:1.5px solid ${tc};color:${tc};border-radius:3px;margin-top:5px}table.info{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:10pt}table.info td{padding:5px 8px;border:1px solid #bbb}table.info .lb{background:#f5f5f5;font-weight:bold;width:78px;text-align:center}.st{font-size:11pt;font-weight:bold;background:#f0f0f0;padding:5px 10px;margin:14px 0 10px;border-left:4px solid ${tc}}.sa{display:flex;justify-content:center;gap:56px;margin-top:36px;align-items:flex-end}.sb{text-align:center}.sl{width:110px;height:64px;display:flex;align-items:flex-end;justify-content:center;border-bottom:1px solid #333;margin-bottom:4px}.fl{font-size:10pt;margin-top:4px}</style></head><body><div class="page"><div class="hdr"><div class="cn">진실한숲교회</div><div class="dt">${esc(m.title)}</div><div class="tb">${tl}</div></div><table class="info"><tr><td class="lb">일 시</td><td>${esc(formatDate(m.date))}</td><td class="lb">장 소</td><td>${esc(m.location)}</td></tr><tr><td class="lb">의 장</td><td>${esc(m.chairperson)}</td><td class="lb">서 기</td><td>${esc(m.secretary)}</td></tr><tr><td class="lb">출석자</td><td colspan="3">${esc(m.attendees)}</td></tr>${m.absentees?`<tr><td class="lb">결석자</td><td colspan="3">${esc(m.absentees)}</td></tr>`:''}</table>${opn?`<p class="fl"><b>개회기도:</b> ${esc(opn)}</p>`:''}<div class="st">회 의 내 용</div>${agenda}${cls?`<p class="fl" style="margin-top:12px"><b>폐회기도:</b> ${esc(cls)}</p>`:''}${nxt?`<p class="fl"><b>다음 회의:</b> ${esc(nxt)}</p>`:''}${m.notes?`<div class="st">비 고</div><p class="fl">${esc(m.notes).replace(/\n/g,'<br>')}</p>`:''}<div class="sa"><div class="sb"><div class="sl">${chairImg}</div><div style="font-size:10pt">의장 ${esc(m.chairperson)} (인)</div></div><div class="sb"><div class="sl">${secImg}</div><div style="font-size:10pt">서기 ${esc(m.secretary)} (인)</div></div></div>${churchImg}</div></body></html>`;
  const w=window.open('','_blank','width=800,height=1000');
  if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500)}
  else showToast('팝업이 차단되었습니다');
}

// ══════════════════════════════════════════
//  Normalize DB fields to camelCase
// ══════════════════════════════════════════
function norm(m){
  return{...m,openingPrayer:m.opening_prayer||'',closingPrayer:m.closing_prayer||'',nextMeeting:m.next_meeting||'',isExample:m.is_example||false,agendaItems:m.agendaItems||[]};
}

// ══════════════════════════════════════════
//  Render
// ══════════════════════════════════════════
function render(){
  if(state.view==='login')renderLogin();
  else if(state.view==='list')renderList();
  else if(state.view==='viewer')renderViewer();
  else if(state.view==='editor')renderEditor();
  else if(state.view==='settings')renderSettings();

  // Toast
  const old=$('.toast');if(old)old.remove();
  if(state.toast){const t=document.createElement('div');t.className='toast';t.textContent=state.toast;document.body.appendChild(t)}

  // Modal
  const oldM=$('.modal-overlay');if(oldM)oldM.remove();
  if(state.modal){
    const ov=document.createElement('div');ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal-box"><div class="modal-title">${state.modal.title}</div><div class="modal-text">${state.modal.text}</div><div class="modal-actions"><button class="btn btn-secondary btn-sm" id="mc">취소</button><button class="btn ${state.modal.btnClass||'btn-danger'} btn-sm" id="mok">${state.modal.btnLabel||'확인'}</button></div></div>`;
    document.body.appendChild(ov);
    $('#mc').onclick=()=>{state.modal=null;render()};
    $('#mok').onclick=()=>{state.modal.onConfirm();state.modal=null};
    ov.onclick=e=>{if(e.target===ov){state.modal=null;render()}};
  }
}

// ── Login ──
function renderLogin(){
  app.innerHTML=`<div class="login-wrap"><div class="login-box anim-up">

  bindAgenda();

  $('#bcan').onclick=()=>{if(m.id&&state.minutes.find(x=>x.id===m.id)){const orig=norm(state.minutes.find(x=>x.id===m.id));state.current=orig;state.agendaItems=orig.agendaItems;setState({view:'viewer'})}else setState({view:'list',current:null})};

function agendaHTML(a,i){
  return`<div class="agenda-item-card" data-idx="${i}"><div class="agenda-item-top"><span class="agenda-item-num">안건 ${i+1}</span><button class="agenda-remove ar" data-idx="${i}">×</button></div><input class="form-input at" value="${esc(a.title)}" placeholder="안건 제목" data-idx="${i}"><textarea class="form-input act" rows="3" placeholder="논의 내용" data-idx="${i}">${esc(a.content)}</textarea><input class="form-input agenda-decision-input ad" value="${esc(a.decision)}" placeholder="의결사항" data-idx="${i}"></div>`;
}
function bindAgenda(){$$('.ar').forEach(b=>{b.onclick=()=>{if(state.agendaItems.length<=1)return;collectAgenda();state.agendaItems.splice(+b.dataset.idx,1);$('#ac').innerHTML=state.agendaItems.map((a,i)=>agendaHTML(a,i)).join('');bindAgenda()}})}
function collectAgenda(){$$('.agenda-item-card').forEach(c=>{const i=+c.dataset.idx;const a=state.agendaItems[i];if(!a)return;const t=c.querySelector('.at');const ct=c.querySelector('.act');const d=c.querySelector('.ad');if(t)a.title=t.value;if(ct)a.content=ct.value;if(d)a.decision=d.value})}
function collectForm(){const m=state.current;m.title=($('#ft')||{}).value||m.title;m.date=($('#fd')||{}).value||'';m.location=($('#fl')||{}).value||'';m.chairperson=($('#fc')||{}).value||'';m.secretary=($('#fs')||{}).value||'';m.attendees=($('#fa')||{}).value||'';m.absentees=($('#fab')||{}).value||'';m.openingPrayer=($('#fo')||{}).value||'';m.closingPrayer=($('#fcp')||{}).value||'';m.nextMeeting=($('#fn')||{}).value||'';m.notes=($('#fno')||{}).value||''}

      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
        <h4 style="font-size:13px;font-weight:700;margin-bottom:10px">새 계정 추가</h4>
        <div class="form-row2" style="margin-bottom:8px"><div><label class="form-label">아이디</label><input class="form-input" id="nu-id" placeholder="영문 아이디"></div><div><label class="form-label">이름</label><input class="form-input" id="nu-name" placeholder="표시 이름"></div></div>
        <div class="form-row2" style="margin-bottom:8px"><div><label class="form-label">비밀번호</label><input class="form-input" id="nu-pw" type="password"></div><div><label class="form-label">역할</label><select class="form-input" id="nu-role"><option value="viewer">열람자</option><option value="secretary">서기</option><option value="pastor">담임목사</option></select></div></div>
        <div id="nu-msg" style="font-size:12px;margin-bottom:8px;display:none"></div>
        <button class="btn btn-primary btn-sm" id="nu-btn">계정 추가</button>
      </div>
    </div>`:''}

    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:8px">ℹ️ 계정 정보</h3>
      <div style="font-size:13px;color:var(--text3);line-height:1.8">
        아이디: <b>${esc(u.username)}</b><br>이름: <b>${esc(u.display_name)}</b><br>역할: <b>${ROLES[u.role].label}</b>
      </div>
    </div>
  </div>`;

  $('#sb').onclick=()=>setState({view:'list'});

  // Stamp management
  if(can('manage')){
    $$('.stamp-upload').forEach(b=>{
      b.onclick=()=>{const inp=$(`#stamp-file-${b.dataset.type}`);inp.click();
        inp.onchange=async(e)=>{const f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){showToast('파일이 너무 큽니다 (최대 2MB)');return}try{const data=await fileToBase64(f);await saveStamp(b.dataset.type,data,'');render();renderSettings()}catch(er){showToast('업로드에 실패했습니다')}};
      };
    });
    $$('.stamp-delete').forEach(b=>{
      b.onclick=()=>{state.modal={title:'도장 삭제',text:'이 도장을 삭제하시겠습니까?',onConfirm:async()=>{await deleteStamp(b.dataset.type);renderSettings()}};render()};
    });
  }

  // Password change
  $('#pw-btn').onclick=async()=>{
    const o=$('#pw-old').value,n=$('#pw-new').value,c=$('#pw-conf').value;
    const msg=$('#pw-msg');
    if(!o||!n){msg.style.display='block';msg.style.color='#D4726A';msg.textContent='모든 필드를 입력해 주세요';return}
    if(n!==c){msg.style.display='block';msg.style.color='#D4726A';msg.textContent='새 비밀번호가 일치하지 않습니다';return}
    if(n.length<4){msg.style.display='block';msg.style.color='#D4726A';msg.textContent='비밀번호는 4자 이상이어야 합니다';return}
    try{
      const r=await sbRpc('change_password',{p_user_id:u.id,p_old_password:o,p_new_password:n});
      if(r===true||r===true){msg.style.display='block';msg.style.color='var(--ops)';msg.textContent='비밀번호가 변경되었습니다!';$('#pw-old').value='';$('#pw-new').value='';$('#pw-conf').value=''}
      else{msg.style.display='block';msg.style.color='#D4726A';msg.textContent='현재 비밀번호가 올바르지 않습니다'}
    }catch(e){msg.style.display='block';msg.style.color='#D4726A';msg.textContent='오류가 발생했습니다'}
  };

  // User management
  if(can('manage')){
    (async()=>{
      try{
        const users=await sbGet('users','order=created_at.asc');
        const ul=$('#user-list');
        if(ul)ul.innerHTML=users.map(usr=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><span class="user-role ${ROLES[usr.role]?.class||'role-viewer'}" style="margin-right:6px">${ROLES[usr.role]?.label||usr.role}</span><span style="font-size:13px;font-weight:600">${esc(usr.display_name)}</span><span style="font-size:11px;color:var(--text4);margin-left:6px">(${esc(usr.username)})</span></div>
        </div>`).join('');
      }catch(e){console.error(e)}
    })();

    $('#nu-btn').onclick=async()=>{
      const id=$('#nu-id').value.trim(),nm=$('#nu-name').value.trim(),pw=$('#nu-pw').value,rl=$('#nu-role').value;
      const msg=$('#nu-msg');
      if(!id||!nm||!pw){msg.style.display='block';msg.style.color='#D4726A';msg.textContent='모든 필드를 입력해 주세요';return}
      try{
        // Use raw SQL via rpc wouldn't work easily, so insert with pre-hashed password
        // We'll use a workaround: call a custom function or insert directly
        // For simplicity, let's add an RPC for this
        await sbRpc('verify_login',{p_username:'__check__',p_password:'__check__'}); // dummy to test connection
        // Actually, we need to insert with crypt. Let's use the REST API with a raw POST
        // Since we can't call crypt from client, we'll create the user via a function
        // For now, let's just try inserting and see - the password will need to be hashed server-side
        // Best approach: create an add_user function. For now, show a message.
        msg.style.display='block';msg.style.color='var(--ops)';
        msg.textContent='계정을 추가하려면 Supabase SQL Editor에서 아래 명령어를 실행해 주세요:';
        const code=document.createElement('div');
        code.style.cssText='background:#f5f3ee;padding:10px;border-radius:6px;font-size:11px;margin-top:6px;word-break:break-all;font-family:monospace';
        code.textContent=`INSERT INTO users (username, password_hash, display_name, role) VALUES ('${id}', crypt('${pw}', gen_salt('bf')), '${nm}', '${rl}');`;
        msg.after(code);
      }catch(e){msg.style.display='block';msg.style.color='#D4726A';msg.textContent='오류가 발생했습니다'}
    };
  }
}

// ══════════════════════════════════════════
//  Init
// ══════════════════════════════════════════
(async function init(){
  const sess=loadSession();
  if(sess){
    state.user=sess;
    render(); // show loading
    await loadMinutes();
    setState({view:'list'});
  }else{render()}
})();
</script>
<div id="install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:var(--text1);color:#fff;z-index:2000;animation:fadeUp .3s ease">
  <div style="max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div style="font-size:13px;line-height:1.4"><b>📋 홈 화면에 추가</b><br><span style="font-size:11px;opacity:.8">앱처럼 바로 실행할 수 있습니다</span></div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="dismissInstall()" style="background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">닫기</button>
      <button id="install-btn" onclick="doInstall()" style="background:#fff;color:var(--text1);border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">설치</button>
    </div>
  </div>
</div>

<script>
// PWA Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if(!localStorage.getItem('cm-install-dismissed')){
    document.getElementById('install-banner').style.display='block';
  }
});
function doInstall(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none'})}
  else{
    // iOS Safari fallback - show instructions
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS){alert('Safari 하단의 공유 버튼(⬆️)을 누른 후\n"홈 화면에 추가"를 선택해 주세요.')}
    else{alert('브라우저 메뉴(⋮)에서\n"홈 화면에 추가" 또는 "앱 설치"를 선택해 주세요.')}
    document.getElementById('install-banner').style.display='none';
  }
}
function dismissInstall(){document.getElementById('install-banner').style.display='none';localStorage.setItem('cm-install-dismissed','1')}

// Register service worker for offline caching
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('data:text/javascript;base64,'+btoa(`
    const CACHE='cm-v1';
    const URLS=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)).then(()=>self.skipWaiting())));
    self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      e.respondWith(fetch(e.request).then(r=>{if(r.ok){const c=r.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c))}return r}).catch(()=>caches.match(e.request)));
    });
  `)).catch(()=>{});
}
</script>
